<!DOCTYPE html>
<html>
<head>
    <title>Flappy Bird Telegram</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #70c5ce; font-family: Arial, sans-serif; }
        canvas { display: block; margin: 0 auto; background: #fff; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth > 400 ? 400 : window.innerWidth;
        canvas.height = window.innerHeight;

        let bird = { x: 50, y: 150, w: 20, h: 20, gravity: 0.6, lift: -10, velocity: 0 };
        let pipes = [];
        let frame = 0;
        let score = 0;
        let gameOver = false;

        function drawBird() {
            ctx.fillStyle = "yellow";
            ctx.fillRect(bird.x, bird.y, bird.w, bird.h);
        }

        function updateBird() {
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;
            if (bird.y + bird.h > canvas.height || bird.y < 0) gameOver = true;
        }

        function createPipe() {
            if (frame % 90 === 0) {
                let gap = 120;
                let minPipeHeight = 50;
                let height = Math.floor(Math.random() * (canvas.height - gap - (minPipeHeight * 2))) + minPipeHeight;
                pipes.push({ x: canvas.width, top: height, bottom: canvas.height - height - gap });
            }
        }

        function drawPipes() {
            ctx.fillStyle = "green";
            pipes.forEach(p => {
                ctx.fillRect(p.x, 0, 40, p.top);
                ctx.fillRect(p.x, canvas.height - p.bottom, 40, p.bottom);
                p.x -= 3;
            });
            pipes = pipes.filter(p => p.x > -40);
        }

        function checkCollision() {
            pipes.forEach(p => {
                if (bird.x < p.x + 40 && bird.x + bird.w > p.x &&
                    (bird.y < p.top || bird.y + bird.h > canvas.height - p.bottom)) {
                    gameOver = true;
                }
            });
        }

        function gameLoop() {
            if (gameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.fillText("GAME OVER - Tap to Restart", canvas.width/4, canvas.height/2);
                return;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBird();
            updateBird();
            createPipe();
            drawPipes();
            checkCollision();
            frame++;
            score++;
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener("mousedown", () => {
            if (gameOver) {
                bird.y = 150; bird.velocity = 0; pipes = []; gameOver = false; score = 0; gameLoop();
            } else {
                bird.velocity = bird.lift;
            }
        });

        gameLoop();
    </script>
</body>
</html>
