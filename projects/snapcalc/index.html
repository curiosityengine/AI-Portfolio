<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SnapCalc</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../style.css">
</head>
<body>

  <!-- Corner labels -->
  <div class="corner tl">SNAP<br>CALC</div>
  <div class="corner tr">v2.0<br>AI</div>
  <div class="corner bl">FREE<br>FOREVER</div>
  <div class="corner br">GROQ<br>POWERED</div>

  <div class="wrapper">
    <div class="badge">instant calculator</div>

    <h1>Snap<span>Calc</span></h1>
    <p class="subtitle">type anything · get the answer · no fluff</p>

    <div class="input-wrap">
      <input
        id="inputBox"
        type="text"
        placeholder="1 kg mein kitna pound hota hai..."
        autocomplete="off"
        spellcheck="false"
        autofocus
      />
    </div>

    <p class="hint">press enter or just stop typing</p>

    <div class="result-wrap">
      <div id="result" class="idle">_</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
