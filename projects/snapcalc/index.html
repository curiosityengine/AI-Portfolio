<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SnapCalc</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script defer src="script.js"></script>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex items-center justify-center h-screen">

  <div class="w-full max-w-xl px-4">
    
    <!-- Title -->
    <h1 class="text-3xl font-semibold text-center mb-6">
      SnapCalc
    </h1>

    <!-- Input -->
    <input 
      id="inputBox"
      type="text"
      placeholder="Type anything... (e.g. 1 kg to pound)"
      class="w-full p-4 text-lg rounded-xl bg-gray-900 border border-gray-700 focus:outline-none"
      autofocus
    />

    <!-- Result -->
    <div id="result" class="text-4xl text-center mt-8 font-bold">
      ...
    </div>

  </div>

</body>
</html>
