<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Warm dark background -->
  <rect width="32" height="32" rx="7" fill="#0e0e0e"/>

  <!-- Large opening quote mark in gold -->
  <text x="2" y="22" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#c9a96e">"</text>

  <!-- Small closing quote mark, offset bottom right -->
  <text x="18" y="30" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#c9a96e" opacity="0.5">"</text>
</svg>
