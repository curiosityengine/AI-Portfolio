  <circle cx="22" cy="10" r="3" fill="#4f8eff" opacity="0.5"/>
  <circle cx="10" cy="22" r="3" fill="#4f8eff" opacity="0.5"/>
  <circle cx="22" cy="22" r="3" fill="#4f8eff" opacity="0.25"/>
</svg>
