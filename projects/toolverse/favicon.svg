<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- True black background -->
  <rect width="32" height="32" rx="7" fill="#080808"/>

  <!-- Grid of 4 dots — represents a "directory" of tools -->
