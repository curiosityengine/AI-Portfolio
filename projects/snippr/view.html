<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snippr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <link rel="stylesheet" href="snippr.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

<nav class="sn-nav">
  <a href="index.html" class="sn-logo">Snip<span>pr</span></a>
  <div class="sn-nav-right">
    <a href="index.html" class="sn-new-btn">+ New Snippet</a>
  </div>
</nav>

<!-- PASSWORD GATE -->
<div class="sn-gate" id="passwordGate" style="display:none">
  <div class="sn-gate-card">
    <div class="sn-gate-icon">🔒</div>
    <h2>Password Protected</h2>
    <p>This snippet is protected. Enter the password to view it.</p>
    <div class="sn-pass-wrap">
      <input type="password" id="gatePassword" placeholder="Enter password...">
      <button class="sn-pass-toggle" onclick="toggleGatePass()" type="button">👁</button>
    </div>
    <p class="sn-gate-error" id="gateError"></p>
    <button class="sn-submit" onclick="unlockPaste()">Unlock →</button>
  </div>
</div>

<!-- MAIN VIEW -->
<main class="sn-main" id="pasteView" style="display:none">

  <div class="sn-view-header">
    <div>
      <h1 id="pasteTitle" class="sn-view-title"></h1>
      <div class="sn-view-meta" id="pasteMeta"></div>
    </div>
    <div class="sn-view-actions">
      <button class="sn-action-btn" onclick="copyContent()" id="copyContentBtn">Copy Code</button>
      <button class="sn-action-btn" onclick="copyLink()" id="copyLinkBtn">Copy Link</button>
    </div>
  </div>

  <!-- SHARE + QR ROW -->
  <div class="sn-share-card">
  <div class="sn-share-url-wrap">
    <input class="sn-share-url" id="shareUrl" readonly>
    <button class="sn-copy-btn" onclick="copyLink()">Copy</button>
  </div>
  <div class="sn-share-btns">
    <!-- keep your existing share buttons here -->
  </div>
  <div class="sn-qr-center">
    <canvas id="qrCanvas"></canvas>
    <button class="sn-qr-download" onclick="downloadQR()">Download QR</button>
  </div>
</div>

  <!-- CODE BLOCK -->
  <div class="sn-code-card">
    <div class="sn-code-header">
      <span class="sn-lang-badge" id="langBadge"></span>
      <button class="sn-copy-inline" onclick="copyContent()">Copy</button>
    </div>
    <pre><code id="codeBlock"></code></pre>
  </div>

</main>

<div class="sn-loader" id="loader">
  <div class="sn-loader-dot"></div>
  <div class="sn-loader-dot"></div>
  <div class="sn-loader-dot"></div>
</div>

<footer class="sn-footer">© 2026 Snippr · Built by Prince</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script>
  const SUPABASE_URL = "https://tbygaanjbsfutsixpbnj.supabase.co";
  const SUPABASE_KEY = "sb_publishable_lHVoDfC4d6t9J24igd3jvA_zhM4ZT07";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const code = new URLSearchParams(location.search).get("code");
  let pasteData = null;

  // ── Load paste ────────────────────────────
  async function loadPaste() {
    if (!code) { window.location.href = "index.html"; return; }

    const { data, error } = await sb
      .from("pastes")
      .select("*")
      .eq("short_code", code)
      .single();

    document.getElementById("loader").style.display = "none";

    if (error || !data) {
      document.body.innerHTML += `<div class="sn-error">Snippet not found or has expired.</div>`;
      return;
    }

    // Check expiry
    if (data.expiry && new Date(data.expiry) < new Date()) {
      document.body.innerHTML += `<div class="sn-error">This snippet has expired.</div>`;
      return;
    }

    pasteData = data;

    if (data.password_hash) {
      document.getElementById("passwordGate").style.display = "flex";
    } else {
      renderPaste(data);
    }
  }

  // ── Render paste ──────────────────────────
 async function renderPaste(data) {
    document.title = `${data.title || "Untitled"} — Snippr`;

    const url = `${location.origin}${location.pathname}?code=${code}`;
const shortUrl = await shortenUrl(url);

    document.getElementById("pasteTitle").textContent = data.title || "Untitled";
    document.getElementById("pasteMeta").innerHTML = `
      <span>👁 ${data.views + 1} views</span>
      <span>·</span>
      <span>${timeAgo(data.created_at)}</span>
      <span>·</span>
      <span class="sn-vis-badge">${data.visibility}</span>
      ${data.expiry ? `<span>·</span><span>Expires ${timeAgo(data.expiry, true)}</span>` : ""}
    `;

    document.getElementById("shareUrl").value = shortUrl;

    // Share links
    document.getElementById("waLink").href = `https://wa.me/?text=${encodeURIComponent(shortUrl)}`;
    document.getElementById("tgLink").href = `https://t.me/share/url?url=${encodeURIComponent(shortUrl)}`;
    document.getElementById("twLink").href = `https://twitter.com/intent/tweet?url=${encodeURIComponent(shortUrl)}`;
    document.getElementById("emLink").href = `mailto:?subject=${encodeURIComponent(data.title || "Snippet")}&body=${encodeURIComponent(shortUrl)}`;

    // Code block
    const block = document.getElementById("codeBlock");
    block.textContent = data.content;
    block.className = data.language !== "plaintext" ? `language-${data.language}` : "";
    document.getElementById("langBadge").textContent = data.language || "plaintext";
    hljs.highlightElement(block);

    // QR code
    generateQR(url);
    async function shortenUrl(url) {
  try {
    const res = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(url)}`);
    const short = await res.text();
    return short.startsWith("http") ? short : url;
  } catch {
    return url; // fallback to original if it fails
  }
}
    // Increment views
    sb.from("pastes").update({ views: data.views + 1 }).eq("short_code", code);

    document.getElementById("pasteView").style.display = "block";
  }

  // ── Password unlock ───────────────────────
  async function unlockPaste() {
    const pass = document.getElementById("gatePassword").value;
    const hash = await hashPassword(pass);
    if (hash === pasteData.password_hash) {
      document.getElementById("passwordGate").style.display = "none";
      renderPaste(pasteData);
    } else {
      document.getElementById("gateError").textContent = "Incorrect password.";
    }
  }

  async function hashPassword(pass) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pass));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
  }

  // ── QR Code ───────────────────────────────
  function generateQR(url) {
  new QRious({
    element: document.getElementById("qrCanvas"),
    value: url,
    size: 140,
    backgroundAlpha: 1,
    background: "#0a0a0a",
    foreground: "#ffffff",
    level: "M"
  });
}

  function downloadQR() {
    const canvas = document.getElementById("qrCanvas");
    const a = document.createElement("a");
    a.download = "snippr-qr.png";
    a.href = canvas.toDataURL();
    a.click();
  }

  // ── Copy helpers ──────────────────────────
  function copyContent() {
    navigator.clipboard.writeText(pasteData?.content || "");
    flashBtn("copyContentBtn", "Copied!");
    flashBtn("copy-inline", "Copied!");
  }

  function copyLink() {
    navigator.clipboard.writeText(document.getElementById("shareUrl").value);
    flashBtn("copyLinkBtn", "Copied!");
  }

  function flashBtn(id, text) {
    const btn = document.getElementById(id);
    if (!btn) return;
    const orig = btn.textContent;
    btn.textContent = text;
    setTimeout(() => btn.textContent = orig, 2000);
  }

  function toggleGatePass() {
    const f = document.getElementById("gatePassword");
    f.type = f.type === "password" ? "text" : "password";
  }

  document.getElementById("gatePassword")?.addEventListener("keydown", e => {
    if (e.key === "Enter") unlockPaste();
  });

  function timeAgo(iso, future = false) {
    const diff = Math.floor((new Date(iso) - Date.now()) / 1000);
    const abs  = Math.abs(diff);
    const str  = abs < 60 ? `${abs}s` : abs < 3600 ? `${Math.floor(abs/60)}m` : abs < 86400 ? `${Math.floor(abs/3600)}h` : `${Math.floor(abs/86400)}d`;
    return future ? `in ${str}` : `${str} ago`;
  }

  loadPaste();
</script>
</body>
</html>
