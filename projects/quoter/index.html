<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quoter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #181818;
      --border: #2a2a2a;
      --accent: #c9a96e;
      --accent-dim: rgba(201,169,110,0.08);
      --text: #f0ece4;
      --muted: #666;
      --font-ui: 'DM Sans', sans-serif;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* Header */
    header {
      text-align: center;
      animation: fadeDown 0.6s ease both;
    }

    .badge {
      display: inline-block;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(201,169,110,0.3);
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .tagline {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* Input area */
    .input-section {
      width: 100%;
      animation: fadeUp 0.6s 0.15s ease both;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 1.1rem 1.25rem;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-style: italic;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      resize: none;
      outline: none;
      line-height: 1.6;
      transition: border-color 0.2s, box-shadow 0.2s;
      caret-color: var(--accent);
    }

    textarea::placeholder {
      color: #383838;
      font-style: italic;
    }

    textarea:focus {
      border-color: rgba(201,169,110,0.35);
      box-shadow: 0 0 0 3px rgba(201,169,110,0.06);
    }

    .input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.75rem;
    }

    #charCount {
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* Generate button */
    button#generateBtn {
      padding: 0.75rem 2rem;
      background: var(--accent);
      color: #0e0e0e;
      font-family: var(--font-ui);
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    button#generateBtn:hover { opacity: 0.88; transform: translateY(-1px); }
    button#generateBtn:active { transform: translateY(0); }
    button#generateBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* Status */
    #status {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      min-height: 1rem;
      text-align: center;
    }

    /* Canvas wrapper */
    .canvas-wrap {
      width: 100%;
      animation: fadeUp 0.5s ease both;
    }

    #quoteCanvas {
      width: 100%;
      height: auto;
      border-radius: 16px;
      display: block;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }

    /* Action buttons row */
    .action-row {
      display: none;
      width: 100%;
      gap: 0.75rem;
    }

    .action-row.visible {
      display: flex;
    }

    .action-btn {
      flex: 1;
      padding: 0.85rem 0.5rem;
      background: transparent;
      color: var(--accent);
      font-family: var(--font-ui);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(201,169,110,0.3);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .action-btn:hover {
      background: var(--accent-dim);
      border-color: rgba(201,169,110,0.5);
    }

    .action-btn.primary {
      background: var(--accent);
      color: #0e0e0e;
      border-color: var(--accent);
    }

    .action-btn.primary:hover { opacity: 0.88; }
    .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="page">

    <header>
      <div class="badge">AI Quote Generator</div>
      <h1>Quot<em>er</em></h1>
      <p class="tagline">type any quote · any language · get a shareable image</p>
    </header>

    <div class="input-section">
      <textarea
        id="quoteInput"
        placeholder="Type your quote here... Good morning, Happy Diwali, Stay hungry stay foolish..."
        maxlength="280"
        autofocus
      ></textarea>
      <div class="input-footer">
        <span id="charCount">0 / 280</span>
        <button id="generateBtn">Generate →</button>
      </div>
    </div>

    <div id="status"></div>

    <div class="canvas-wrap" id="canvasWrap" style="display:none">
      <canvas id="quoteCanvas" width="1080" height="1080"></canvas>
    </div>


    <!-- Action buttons: shown after image is generated -->
    <div class="action-row" id="actionRow">
      <button class="action-btn" id="copyBtn">⎘ Copy Image</button>
      <button class="action-btn primary" id="downloadBtn">↓ Download</button>
      <button class="action-btn" id="shareBtn">↗ Share</button>
    </div>

  </div>

  <script>
    const WORKER_URL = "https://snapcalc.princemishra11.workers.dev";

    const quoteInput  = document.getElementById("quoteInput");
    const generateBtn = document.getElementById("generateBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const copyBtn     = document.getElementById("copyBtn");
    const shareBtn    = document.getElementById("shareBtn");
    const actionRow   = document.getElementById("actionRow");
    const canvasWrap  = document.getElementById("canvasWrap");
    const canvas      = document.getElementById("quoteCanvas");
    const ctx         = canvas.getContext("2d");
    const statusEl    = document.getElementById("status");
    const charCount   = document.getElementById("charCount");

    // Char counter
    quoteInput.addEventListener("input", () => {
      charCount.textContent = `${quoteInput.value.length} / 280`;
    });

    // Generate
    generateBtn.addEventListener("click", async () => {
      const quote = quoteInput.value.trim();
      if (!quote) return;

      generateBtn.disabled = true;
      actionRow.classList.remove("visible");
      canvasWrap.style.display = "none";
      setStatus("Reading your quote...");

      try {
        const res = await fetch(`${WORKER_URL}/api/quote`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ quote }),
        });
        const data = await res.json();

        setStatus("Fetching the perfect image...");
        await drawQuoteImage(quote, data);

        canvasWrap.style.display = "block";
        actionRow.classList.add("visible");
        setStatus("✓ Ready to share");
      } catch (err) {
        console.error(err);
        setStatus("Something went wrong. Try again.");
      } finally {
        generateBtn.disabled = false;
      }
    });

    // ── Download ──────────────────────────────
    downloadBtn.addEventListener("click", () => {
      const link = document.createElement("a");
      link.download = "quoter.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    });

    // ── Copy to clipboard ─────────────────────
    copyBtn.addEventListener("click", async () => {
      try {
        const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/png"));
        await navigator.clipboard.write([
          new ClipboardItem({ "image/png": blob })
        ]);
        const original = copyBtn.textContent;
        copyBtn.textContent = "✓ Copied!";
        setTimeout(() => copyBtn.textContent = original, 2000);
      } catch {
        // Fallback: if clipboard API not supported, just download
        setStatus("Copy not supported on this browser — downloading instead.");
        downloadBtn.click();
      }
    });

    // ── Share (Web Share API) ─────────────────
    shareBtn.addEventListener("click", async () => {
      try {
        const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/png"));
        const file = new File([blob], "quoter.png", { type: "image/png" });

        if (navigator.share && navigator.canShare({ files: [file] })) {
          await navigator.share({
            files: [file],
            title: "Quoter",
            text: quoteInput.value.trim(),
          });
        } else {
          // Fallback for desktop: just download
          setStatus("Sharing not supported on this browser — downloading instead.");
          downloadBtn.click();
        }
      } catch (err) {
        if (err.name !== "AbortError") {
          setStatus("Could not share. Try downloading instead.");
        }
      }
    });

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    // ── Core canvas drawing ───────────────────
    async function drawQuoteImage(quote, data) {
      const SIZE = 1080;
      ctx.clearRect(0, 0, SIZE, SIZE);

      if (data.imageUrl) {
        try {
          const img = await loadImage(data.imageUrl);
          const scale = Math.max(SIZE / img.width, SIZE / img.height);
          const w = img.width  * scale;
          const h = img.height * scale;
          const x = (SIZE - w) / 2;
          const y = (SIZE - h) / 2;
          ctx.drawImage(img, x, y, w, h);
        } catch {
          drawFallbackBg(data.mood);
        }
      } else {
        drawFallbackBg(data.mood);
      }

      const opacity = data.overlayOpacity ?? 0.4;
      ctx.fillStyle = `rgba(0,0,0,${opacity})`;
      ctx.fillRect(0, 0, SIZE, SIZE);

      const accent = data.textColor === "#000000" ? "rgba(0,0,0,0.15)" : "rgba(255,255,255,0.12)";
      ctx.fillStyle = accent;
      ctx.fillRect(80, 90, SIZE - 160, 1.5);
      ctx.fillRect(80, SIZE - 90, SIZE - 160, 1.5);

      const textColor = data.textColor ?? "#ffffff";
      const fontFamily = getFontFamily(data.fontStyle);
      drawWrappedText(quote, textColor, fontFamily, SIZE);

      if (data.attribution) {
        ctx.fillStyle = textColor;
        ctx.globalAlpha = 0.6;
        ctx.font = `300 32px 'DM Sans', sans-serif`;
        ctx.textAlign = "center";
        ctx.fillText(`— ${data.attribution}`, SIZE / 2, SIZE - 130);
        ctx.globalAlpha = 1;
      }

      ctx.fillStyle = textColor;
      ctx.globalAlpha = 0.35;
      ctx.font = `300 26px 'DM Sans', sans-serif`;
      ctx.textAlign = "right";
      ctx.fillText("made with Quoter", SIZE - 80, SIZE - 52);
      ctx.globalAlpha = 1;
    }

    function drawWrappedText(text, color, fontFamily, SIZE) {
      ctx.fillStyle = color;
      ctx.textAlign = "center";

      const maxWidth = SIZE - 220;
      const centerY  = SIZE / 2;

      let fontSize = 88;
      if (text.length > 80)  fontSize = 62;
      if (text.length > 140) fontSize = 50;
      if (text.length > 200) fontSize = 42;

      ctx.font = `italic ${fontSize}px ${fontFamily}`;

      const words = text.split(" ");
      const lines = [];
      let current = "";

      for (const word of words) {
        const test = current ? `${current} ${word}` : word;
        if (ctx.measureText(test).width > maxWidth && current) {
          lines.push(current);
          current = word;
        } else {
          current = test;
        }
      }
      if (current) lines.push(current);

      ctx.globalAlpha = 0.25;
      ctx.font = `italic ${fontSize * 3.5}px ${fontFamily}`;
      ctx.fillText("\u201C", SIZE / 2 - maxWidth / 2 + 40, centerY - (lines.length * fontSize * 0.65));
      ctx.globalAlpha = 1;

      ctx.font = `italic ${fontSize}px ${fontFamily}`;
      const lineHeight = fontSize * 1.35;
      const totalH = lines.length * lineHeight;
      const startY = centerY - totalH / 2 + fontSize * 0.4;

      lines.forEach((line, i) => {
        ctx.fillText(line, SIZE / 2, startY + i * lineHeight);
      });
    }

    function drawFallbackBg(mood) {
      const gradients = {
        joyful:      ["#f6d365", "#fda085"],
        festive:     ["#a18cd1", "#fbc2eb"],
        calm:        ["#2193b0", "#6dd5ed"],
        motivational:["#1c1c1c", "#434343"],
        romantic:    ["#f093fb", "#f5576c"],
        sad:         ["#2c3e50", "#3498db"],
        spiritual:   ["#654ea3", "#eaafc8"],
        nature:      ["#134e5e", "#71b280"],
        dark:        ["#0f0c29", "#302b63"],
      };
      const [c1, c2] = gradients[mood] ?? gradients.motivational;
      const grad = ctx.createLinearGradient(0, 0, 1080, 1080);
      grad.addColorStop(0, c1);
      grad.addColorStop(1, c2);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 1080, 1080);
    }

    function getFontFamily(style) {
      if (style === "script") return "'Dancing Script', cursive";
      if (style === "sans")   return "'DM Sans', sans-serif";
      return "'Playfair Display', serif";
    }

    function loadImage(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload  = () => resolve(img);
        img.onerror = reject;
        img.src = url;
      });
    }
  </script>
</body>
</html>
